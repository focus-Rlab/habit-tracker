<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Momentum">
<meta name="theme-color" content="#09090E">
<title>Momentum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:#09090E;color:#EFEFFA;font-family:'Inter','Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
input:focus,textarea:focus{outline:none}
::-webkit-scrollbar{width:0;height:0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(.9);opacity:0}55%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes checkBounce{0%{transform:scale(1)}30%{transform:scale(1.28)}65%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes rippleOut{0%{opacity:.55;transform:scale(.3)}100%{opacity:0;transform:scale(3.2)}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-8px) rotate(0deg)}100%{opacity:0;transform:translateY(160px) rotate(720deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(99,102,241,.22)}50%{box-shadow:0 0 44px rgba(99,102,241,.5),0 0 72px rgba(99,102,241,.12)}}
@keyframes microSlide{from{transform:translateY(-6px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes onboardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes weekReportIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes chainPulse{0%,100%{border-color:rgba(6,182,212,.25)}50%{border-color:rgba(6,182,212,.65)}}

/* layout */
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;animation:fadeIn .2s ease}
.sheet-wrap{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);animation:fadeIn .18s ease}
.sheet-panel{position:relative;z-index:1;width:100%;background:#101018;border-radius:28px 28px 0 0;padding:26px 20px 52px;max-height:93vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.22,1,.36,1);border-top:1px solid #1C1C2A}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:#282838;margin:0 auto 22px}

/* cards */
.hcard{position:relative;overflow:hidden;border-radius:22px;transition:transform .1s ease}
.hcard:active{transform:scale(.973)}
.ecard{border-radius:20px;border:1px solid rgba(99,102,241,.2);background:#0D0D16;animation:popIn .2s ease;overflow:hidden}
.ripple{position:absolute;border-radius:50%;pointer-events:none;animation:rippleOut .65s ease-out forwards}
.glow-card{animation:glow 3s ease-in-out infinite}
.shimmer{background:linear-gradient(90deg,#818cf8,#c084fc,#818cf8);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2.8s linear infinite}

/* nav */
.nav-btn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;letter-spacing:.3px;transition:color .15s;color:#363650}
.nav-btn.active{color:#818cf8}
.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(129,140,248,.6))}

/* onboarding */
.ob-wrap{position:fixed;inset:0;z-index:500;background:#09090E;display:flex;flex-direction:column;padding:0;overflow:hidden}
.ob-screen{flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 28px;animation:onboardIn .3s ease}
.ob-progress{height:3px;background:#1C1C2A;position:relative}
.ob-progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);transition:width .4s cubic-bezier(.22,1,.36,1)}
.step-dot{height:3px;border-radius:2px;transition:all .35s}

/* micro habit */
.micro-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;borderRadius:6px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25);color:#06b6d4;font-size:9px;font-weight:700;letter-spacing:.4px}

/* chain */
.chain-indicator{animation:chainPulse 2.5s ease-in-out infinite}

/* week report */
.week-report{animation:weekReportIn .3s ease;border-radius:22px;overflow:hidden}

/* skip options */
.skip-opt{padding:13px 16px;border-radius:13px;border:1px solid #1C1C2A;background:#0D0D16;margin-bottom:8px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.skip-opt.sel{border-color:rgba(99,102,241,.45);background:#11112A}

/* mood buttons */
.mood-btn{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;transition:all .15s;border:2px solid transparent;cursor:pointer;background:#0D0D16}
.mood-btn.active{border-color:#818cf8;background:rgba(99,102,241,.14);transform:scale(1.12)}
.mood-btn:active{transform:scale(.9)}

/* diff badge */
.diff-tag{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.4px}

/* confetti */
.cp{position:fixed;pointer-events:none;z-index:500;width:7px;height:7px;border-radius:2px;animation:confettiFall .95s ease-in forwards}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.cal-cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Inter',sans-serif}

/* input styles */
.field{width:100%;padding:14px;background:#0D0D16;border:1px solid #1C1C2A;border-radius:14px;color:#EFEFFA;font-size:14px}
.field:focus{border-color:rgba(99,102,241,.5)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

/* ═══════════════════════════════════
   定数
═══════════════════════════════════ */
const HK="mb_v3",AK="ma_v3",RK="ref_v3",MAX=20;
const DOW=["日","月","火","水","木","金","土"];
const CC=["#6366f1","#22c55e","#f59e0b","#ec4899","#06b6d4","#a855f7"];
const MOODS=[{e:"😔",l:"しんどい",v:1},{e:"😐",l:"普通",v:2},{e:"🙂",l:"まあまあ",v:3},{e:"😊",l:"良い",v:4},{e:"🔥",l:"最高",v:5}];
const SKIP_REASONS=[
  {id:"tired",emoji:"😴",label:"疲れていた"},
  {id:"busy",emoji:"⏰",label:"時間がなかった"},
  {id:"forgot",emoji:"🤔",label:"忘れていた"},
  {id:"sick",emoji:"🤒",label:"体調不良"},
  {id:"mood",emoji:"😞",label:"気分が乗らなかった"},
  {id:"other",emoji:"💬",label:"その他"},
];
const DIFFS=[
  {id:"easy",  label:"簡単", mult:.8,  color:"#22c55e", desc:"5分以内"},
  {id:"medium",label:"普通", mult:1.0, color:"#818cf8", desc:"10〜30分"},
  {id:"hard",  label:"困難", mult:1.5, color:"#f59e0b", desc:"30分以上"},
];

/* ═══════════════════════════════════
   ユーティリティ
═══════════════════════════════════ */
const p2=n=>String(n).padStart(2,"0");
const rYM=()=>{const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}`;};
const rDay=()=>new Date().getDate();
const rDow=()=>new Date().getDay();
const dim=ym=>{const[y,m]=ym.split("-").map(Number);return new Date(y,m,0).getDate();};
const ymLbl=ym=>{const[y,m]=ym.split("-").map(Number);return`${y}年${m}月`;};
const dayLbl=()=>{const d=new Date();return`${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;};

/* 今週の月曜〜日曜 YYYY-MM-DD 配列を返す */
const thisWeekDays=()=>{
  const today=new Date();
  const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;});
};

const newHabit=(startDay=1)=>({
  id:`${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
  name:"習慣",
  why:"",            // なぜやるか
  microHabit:"",     // ★NEW やる気ゼロ日用の最小行動
  envDesign:"",      // ★NEW 環境設計メモ
  difficulty:"medium",
  chainAfter:"",     // ★NEW If-Then: 別習慣IDの後に行う
  checks:{},
  skips:{},
  startDay,
  active:true,
  shieldUsed:{},
  createdAt:new Date().toISOString(),
  color:CC[Math.floor(Math.random()*CC.length)],
});

/* ═══════════════════════════════════
   ストレージ
═══════════════════════════════════ */
const load=()=>{
  try{
    const habits=JSON.parse(localStorage.getItem(HK)||"null")||[newHabit(1)];
    const archive=JSON.parse(localStorage.getItem(AK)||"{}");
    const reflections=JSON.parse(localStorage.getItem(RK)||"{}");
    const migrated=habits.map(h=>({
      why:"",microHabit:"",envDesign:"",difficulty:"medium",
      chainAfter:"",skips:{},shieldUsed:{},...h
    }));
    return{habits:migrated,archive,reflections};
  }catch{return{habits:[newHabit(1)],archive:{},reflections:{}};}
};
const persist=(h,a,r)=>{
  localStorage.setItem(HK,JSON.stringify(h));
  localStorage.setItem(AK,JSON.stringify(a));
  localStorage.setItem(RK,JSON.stringify(r));
};

/* ═══════════════════════════════════
   Momentum計算（難易度倍率対応）
═══════════════════════════════════ */
const calcMomentum=habit=>{
  const diff=DIFFS.find(d=>d.id===habit.difficulty)||DIFFS[1];
  let m=0,pen=1.0;
  const today=new Date();
  for(let i=0;i<60;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const ym=`${d.getFullYear()}-${p2(d.getMonth()+1)}`;
    const day=d.getDate();
    const checked=!!(habit.checks[ym]||{})[day];
    const skipped=!!(habit.skips[ym]||{})[day];
    const shielded=!!(habit.shieldUsed[ym]);
    if(checked){m+=diff.mult*pen;pen=Math.min(pen+0.15,1.0);}
    else if(i===0){}
    else if(skipped||shielded){pen*=0.85;}
    else{pen*=0.65;if(pen<0.08)break;}
  }
  return Math.round(m*10)/10;
};

const predictMomentum=habit=>{
  const cur=calcMomentum(habit);
  const diff=DIFFS.find(d=>d.id===habit.difficulty)||DIFFS[1];
  const next=[5,10,20,50,100].find(t=>t>cur)||100;
  return{cur,next,days:Math.ceil((next-cur)/diff.mult)};
};

const calcStreak=habit=>{
  const today=new Date();let s=0;
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const ym=`${d.getFullYear()}-${p2(d.getMonth()+1)}`;
    if(i===0&&!(habit.checks[ym]||{})[d.getDate()])continue;
    if((habit.checks[ym]||{})[d.getDate()]||(habit.shieldUsed[ym]&&i>0)){s++;}else break;
  }
  return s;
};

const calcStats=(habit,ym)=>{
  const today=new Date();
  const[y,m]=ym.split("-").map(Number);
  const isNow=y===today.getFullYear()&&m===today.getMonth()+1;
  const start=habit.startDay??1,end=isNow?today.getDate():dim(ym),eff=Math.max(0,end-start+1);
  const mc=habit.checks[ym]||{};
  const checked=Object.entries(mc).filter(([d,v])=>v&&Number(d)>=start).length;
  const rate=eff>0?Math.round(checked/eff*100):0;
  const firstDow=new Date(y,m-1,1).getDay();
  const weeks=[0,1,2,3,4].map(w=>{
    let cnt=0,tot=0;
    for(let d=start;d<=end;d++){if(Math.floor((d-1+firstDow)/7)===w){tot++;if(mc[d])cnt++;}}
    return tot>0?Math.round(cnt/tot*100):null;
  });
  return{checked,eff,start,end,rate,weeks};
};

const analyzeSkips=habit=>{
  const dow=[0,0,0,0,0,0,0],reasons={};let total=0;
  Object.entries(habit.skips||{}).forEach(([ym])=>{
    const[yr,mn]=ym.split("-").map(Number);
    Object.entries(habit.skips[ym]||{}).forEach(([day,info])=>{
      const d=new Date(yr,mn-1,Number(day));dow[d.getDay()]++;total++;
      if(info.reason)reasons[info.reason]=(reasons[info.reason]||0)+1;
    });
  });
  const worstDow=dow.indexOf(Math.max(...dow));
  const topR=Object.entries(reasons).sort((a,b)=>b[1]-a[1])[0];
  return{dow,worstDow,topR,total};
};

/* ★ 週次レポートデータ生成 */
const buildWeekReport=(habits,reflections)=>{
  const days=thisWeekDays();
  const ym=rYM();
  const active=habits.filter(h=>h.active);

  // 日別完了数
  const dailyDone=days.map(dateStr=>{
    const[,, dd]=dateStr.split("-");
    const day=Number(dd);
    const dayYm=dateStr.slice(0,7);
    return{
      date:dateStr,
      dow:(()=>{const[y,m,d]=dateStr.split("-").map(Number);return DOW[new Date(y,m-1,d).getDay()];})(),
      done:active.filter(h=>!!(h.checks[dayYm]||{})[day]).length,
      total:active.length,
      mood:reflections[dateStr]?.mood||null,
    };
  });

  // 習慣別週間達成率
  const habitWeek=active.map(h=>{
    let done=0;
    days.forEach(dateStr=>{
      const[,, dd]=dateStr.split("-");
      const dayYm=dateStr.slice(0,7);
      if((h.checks[dayYm]||{})[Number(dd)])done++;
    });
    return{name:h.name,done,total:days.length,pct:Math.round(done/days.length*100),momentum:calcMomentum(h)};
  }).sort((a,b)=>b.pct-a.pct);

  const bestDay=dailyDone.reduce((a,b)=>b.done>a.done?b:a,dailyDone[0]);
  const totalChecks=dailyDone.reduce((s,d)=>s+d.done,0);
  const maxPossible=active.length*7;
  const weekRate=maxPossible>0?Math.round(totalChecks/maxPossible*100):0;
  const avgMood=days.map(d=>reflections[d]?.mood).filter(Boolean);
  const moodAvg=avgMood.length>0?(avgMood.reduce((s,v)=>s+v,0)/avgMood.length).toFixed(1):null;

  return{dailyDone,habitWeek,bestDay,weekRate,totalChecks,maxPossible,moodAvg};
};

/* ★ インサイト生成（拡張版） */
const buildInsights=habits=>{
  const ym=rYM(),td=rDay(),dow=rDow();
  const ins=[];
  habits.filter(h=>h.active).forEach(h=>{
    const m=calcMomentum(h),mc=h.checks[ym]||{};
    const{worstDow,topR,total}=analyzeSkips(h);
    const done=Object.values(mc).filter(Boolean).length;
    const rate=td>0?Math.round(done/td*100):0;
    const streak=calcStreak(h);
    const p=predictMomentum(h);
    if(dow===worstDow&&total>=3&&!mc[td])
      ins.push({type:"warning",n:h.name,msg:`${DOW[worstDow]}曜はスキップしやすい傾向。今日こそ続けましょう。`,icon:"⚠️",pri:4});
    if(m>=15&&!mc[td])
      ins.push({type:"encourage",n:h.name,msg:`Momentum ${m}まで積み上がっています。今日も続けてこの慣性を守りましょう。`,icon:"⚡",pri:3});
    if(rate<40&&td>=7)
      ins.push({type:"concern",n:h.name,msg:`今月の達成率が${rate}%です。Micro Habitを設定して小さく継続しましょう。`,icon:"💡",pri:2});
    if(streak===7||streak===14||streak===30||streak===60)
      ins.push({type:"milestone",n:h.name,msg:`「${h.name}」${streak}日連続達成！`,icon:"🏆",pri:6});
    if(p.days<=3&&p.cur<p.next)
      ins.push({type:"predict",n:h.name,msg:`あと${p.days}日続けるとMomentumが⚡${p.next}を超えます！`,icon:"🎯",pri:3});
    // Micro Habit 提案（達成率低 & micro未設定）
    if(rate<50&&!h.microHabit&&td>=5)
      ins.push({type:"micro",n:h.name,msg:`「${h.name}」の最小行動（Micro Habit）を設定すると、やる気ゼロの日でも続けられます。`,icon:"🌱",pri:2});
    // If-Then 提案
    if(!h.chainAfter&&habits.filter(x=>x.active).length>=2)
      ins.push({type:"chain",n:h.name,msg:`「${h.name}」を別の習慣の後に行うIf-Thenルールを設定すると達成率が上がります。`,icon:"🔗",pri:1});
    if(topR&&topR[1]>=3){
      const r=SKIP_REASONS.find(x=>x.id===topR[0]);
      if(r)ins.push({type:"pattern",n:h.name,msg:`「${r.label}」でのSkipが多い傾向。環境設計で解決できるかもしれません。`,icon:"📊",pri:2});
    }
  });
  const allDone=habits.filter(h=>h.active).every(h=>!!(h.checks[ym]||{})[td]);
  if(allDone&&habits.filter(h=>h.active).length>0)
    ins.push({type:"celebrate",n:"all",msg:"今日の全習慣を達成！この積み重ねが未来の自分を変えます。",icon:"🎉",pri:10});
  return ins.sort((a,b)=>b.pri-a.pri).slice(0,4);
};

const calcCorr=(h1,h2)=>{
  const ym=rYM(),mc1=h1.checks[ym]||{},mc2=h2.checks[ym]||{};
  let both=0,either=0;
  for(let d=1;d<=rDay();d++){const a=!!mc1[d],b=!!mc2[d];if(a&&b)both++;if(a||b)either++;}
  return either>4?Math.round(both/either*100):null;
};

const runAutoArchive=(habits,archive)=>{
  const rym=rYM();let nA={...archive},nH=habits,did=false;
  const months=new Set();
  habits.forEach(h=>{Object.keys(h.checks||{}).forEach(ym=>months.add(ym));Object.keys(h.skips||{}).forEach(ym=>months.add(ym));});
  months.forEach(ym=>{
    if(ym>=rym||nA[ym])return;
    const d=dim(ym);
    nA={...nA,[ym]:{ym,label:ymLbl(ym),archivedAt:new Date().toISOString(),daysInMonth:d,
      habits:habits.map(h=>{
        const st=h.startDay??1,mc=h.checks[ym]||{},sk=h.skips[ym]||{};
        const checked=Object.entries(mc).filter(([day,v])=>v&&Number(day)>=st).length;
        const eff=Math.max(0,d-st+1);
        return{name:h.name,id:h.id,why:h.why||"",microHabit:h.microHabit||"",
          difficulty:h.difficulty||"medium",checked,
          skipped:Object.keys(sk).filter(day=>Number(day)>=st).length,
          rate:eff>0?Math.round(checked/eff*100):0,
          momentum:calcMomentum(h),startDay:st};
      })}};
    did=true;
  });
  if(did)nH=habits.map(h=>({...h,startDay:1}));
  return{habits:nH,archive:nA,did};
};

const spawnConfetti=()=>{for(let i=0;i<32;i++){const el=document.createElement("div");el.className="cp";el.style.cssText=`left:${Math.random()*100}vw;top:${12+Math.random()*38}vh;background:${CC[i%CC.length]};animation-delay:${Math.random()*.42}s;animation-duration:${.75+Math.random()*.55}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>.5?"50%":"2px"};`;document.body.appendChild(el);setTimeout(()=>el.remove(),1500);}};

/* ═══════════════════════════════════════════════
   メインアプリ
═══════════════════════════════════════════════ */
function App(){
  const[st,setSt]=useState(()=>{const l=load();const{habits,archive}=runAutoArchive(l.habits,l.archive);return{habits,archive,reflections:l.reflections};});
  const[screen,setScreen]=useState("today");
  const[detail,setDetail]=useState(null);
  const[editMode,setEditMode]=useState(false);
  const[toast,setToast]=useState(null);
  const[skipTarget,setSkipTarget]=useState(null);
  const[showInsights,setShowInsights]=useState(false);
  const[onboarding,setOnboarding]=useState(()=>!localStorage.getItem(HK));
  const[reflectOpen,setReflectOpen]=useState(false);
  const[showMicro,setShowMicro]=useState(null); // habitId
  const prevDone=useRef(0);

  const{habits,archive,reflections}=st;
  const ym=rYM(),td=rDay();

  useEffect(()=>{persist(habits,archive,reflections);},[habits,archive,reflections]);
  useEffect(()=>{const t=setInterval(()=>{setSt(prev=>{const{habits:h,archive:a,did}=runAutoArchive(prev.habits,prev.archive);return did?{...prev,habits:h,archive:a}:prev;});},60000);return()=>clearInterval(t);},[]);

  // 夕方18時以降にリフレクション促進
  useEffect(()=>{
    if(new Date().getHours()>=18&&!reflections[`${ym}-${p2(td)}`]&&habits.filter(h=>h.active).length>0){
      const t=setTimeout(()=>setReflectOpen(true),4000);return()=>clearTimeout(t);
    }
  },[]);

  const showToast=useCallback(msg=>{setToast(msg);setTimeout(()=>setToast(null),3200);},[]);

  const toggleToday=useCallback(id=>{
    setSt(prev=>({...prev,habits:prev.habits.map(h=>{if(h.id!==id)return h;const mc={...(h.checks[ym]||{})};mc[td]=!mc[td];return{...h,checks:{...h.checks,[ym]:mc}};})}));
  },[ym,td]);

  const recordSkip=useCallback((id,reason,note="")=>{
    setSt(prev=>({...prev,habits:prev.habits.map(h=>{if(h.id!==id)return h;const sk={...(h.skips[ym]||{})};sk[td]={reason,note,ts:Date.now()};const mc={...(h.checks[ym]||{})};mc[td]=false;return{...h,checks:{...h.checks,[ym]:mc},skips:{...h.skips,[ym]:sk}};})}));
    setSkipTarget(null);showToast("Skip記録完了。理由の蓄積がパターンを明らかにします。");
  },[ym,td,showToast]);

  const useShield=useCallback(id=>{
    setSt(prev=>({...prev,habits:prev.habits.map(h=>{if(h.id!==id||h.shieldUsed[ym])return h;return{...h,shieldUsed:{...h.shieldUsed,[ym]:true}};})}));
    showToast("🛡 Streak Shieldを使用。今月のStreakを保護します。");
  },[ym,showToast]);

  const updateHabit=useCallback((id,fields)=>{setSt(prev=>({...prev,habits:prev.habits.map(h=>h.id===id?{...h,...fields}:h)}));},[]);
  const saveReflection=useCallback((mood,note)=>{const k=`${ym}-${p2(td)}`;setSt(prev=>({...prev,reflections:{...prev.reflections,[k]:{mood,note,ts:Date.now()}}}));setReflectOpen(false);showToast("振り返りを記録しました 📝");},[ym,td,showToast]);
  const addHabit=useCallback(()=>{if(habits.length>=MAX)return;setSt(prev=>({...prev,habits:[...prev.habits,newHabit(rDay())]}));},[habits.length]);
  const removeHabit=useCallback(id=>{setSt(prev=>({...prev,habits:prev.habits.filter(h=>h.id!==id)}));},[]);
  const renameHabit=useCallback((id,name)=>{setSt(prev=>({...prev,habits:prev.habits.map(h=>h.id===id?{...h,name}:h)}));},[]);

  const active=useMemo(()=>habits.filter(h=>h.active),[habits]);
  const doneToday=useMemo(()=>active.filter(h=>!!(h.checks[ym]||{})[td]).length,[active,ym,td]);
  const total=active.length;
  const allDone=total>0&&doneToday===total;
  const insights=useMemo(()=>buildInsights(habits),[habits,ym,td]);
  const topM=useMemo(()=>active.length>0?Math.max(0,...active.map(calcMomentum)):0,[active]);
  const todayRef=reflections[`${ym}-${p2(td)}`];
  const weekReport=useMemo(()=>buildWeekReport(habits,reflections),[habits,reflections]);
  const microHabit=useMemo(()=>showMicro?habits.find(x=>x.id===showMicro):null,[showMicro,habits]);

  useEffect(()=>{if(allDone&&total>0&&doneToday>prevDone.current)spawnConfetti();prevDone.current=doneToday;},[doneToday,total]);

  // If-Then チェーン: ある習慣をチェックしたら連鎖習慣を視覚的に促す
  const chainTarget=useMemo(()=>{
    if(!allDone)return null;
    return habits.find(h=>{
      if(!h.chainAfter) return false;
      const src=habits.find(x=>x.id===h.chainAfter);
      if(!src) return false;
      const srcChecked=!!(src.checks[ym]||{})[td];
      const selfDone=!!(h.checks[ym]||{})[td];
      return srcChecked && !selfDone;
    });
  },[habits,ym,td,allDone]);

  if(onboarding)return<Onboarding onComplete={h=>{setSt(prev=>({...prev,habits:[h]}));setOnboarding(false);}}/>;

  const TABS=[{key:"today",label:"Today",icon:TodayIco},{key:"momentum",label:"Momentum",icon:MomIco},{key:"weekly",label:"Weekly",icon:WeekIco},{key:"coach",label:"Coach",icon:CoachIco}];

  return(
    <div style={{position:"fixed",inset:0,background:"#09090E",overflow:"hidden"}}>

      {/* ════ TODAY ════ */}
      {screen==="today"&&(
        <div className="page">
          {/* ヘッダー */}
          <div style={{padding:"54px 20px 0"}}>
            <div style={{fontSize:11,color:"#363650",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>{dayLbl()}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginTop:4}}>
              <div style={{fontSize:31,fontWeight:900,letterSpacing:-1.5,lineHeight:1}}>{editMode?"Edit":"Today"}</div>
              {insights.length>0&&!editMode&&(
                <button onClick={()=>setShowInsights(true)} style={{position:"relative",background:"rgba(99,102,241,.09)",borderRadius:11,padding:"7px 11px",border:"1px solid rgba(99,102,241,.2)",display:"flex",alignItems:"center",gap:5,color:"#818cf8",fontSize:11,fontWeight:600}}>
                  💡 {insights.length}件
                  <div style={{position:"absolute",top:-3,right:-3,width:7,height:7,borderRadius:"50%",background:"#818cf8",animation:"pulse 1.5s infinite"}}/>
                </button>
              )}
            </div>
          </div>

          {/* ★ If-Then チェーン促進バナー */}
          {chainTarget&&!editMode&&(
            <div className="chain-indicator" style={{margin:"14px 20px 0",background:"rgba(6,182,212,.06)",border:"1px solid rgba(6,182,212,.3)",borderRadius:18,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:22}}>🔗</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:800,color:"#06b6d4"}}>If-Then チェーン</div>
                <div style={{fontSize:11,color:"#888",marginTop:2}}>「{chainTarget.name}」を今やるタイミングです</div>
              </div>
              <button onClick={()=>toggleToday(chainTarget.id)} style={{padding:"7px 12px",background:"rgba(6,182,212,.15)",border:"1px solid rgba(6,182,212,.3)",borderRadius:9,color:"#06b6d4",fontSize:11,fontWeight:700}}>記録</button>
            </div>
          )}

          {/* 全完了バナー */}
          {allDone&&total>0&&!editMode&&(
            <div style={{margin:"14px 20px 0",borderRadius:18,padding:"15px 18px",background:"linear-gradient(90deg,#0D2A1A,#173A0A,#0D2A1A)",backgroundSize:"200% auto",animation:"shimmer 3s linear infinite",border:"1px solid rgba(34,197,94,.28)",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:24}}>🎉</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:800,color:"#22c55e"}}>Today Complete!</div>
                <div style={{fontSize:10,color:"#16a34a",marginTop:2}}>週間達成率: {weekReport.weekRate}%</div>
              </div>
              {!todayRef&&<button onClick={()=>setReflectOpen(true)} style={{padding:"7px 12px",background:"rgba(99,102,241,.14)",border:"1px solid rgba(99,102,241,.28)",borderRadius:9,color:"#818cf8",fontSize:11,fontWeight:700}}>📝 振り返る</button>}
            </div>
          )}

          {/* Progress & Momentum */}
          {!allDone&&total>0&&!editMode&&(
            <div style={{margin:"14px 20px 0",display:"flex",gap:10}}>
              <div style={{flex:1,background:"#0D0D16",border:"1px solid #1C1C2A",borderRadius:18,padding:"13px 15px"}}>
                <div style={{fontSize:10,color:"#363650",fontWeight:600,marginBottom:5}}>Today</div>
                <div style={{fontSize:25,fontWeight:900,letterSpacing:-1,fontFamily:"Inter"}}>{doneToday}<span style={{fontSize:13,color:"#363650",fontWeight:500}}>/{total}</span></div>
                <div style={{height:3,background:"#1C1C2A",borderRadius:2,marginTop:9,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:2,transition:"width .5s",width:`${total>0?Math.round(doneToday/total*100):0}%`,background:"linear-gradient(90deg,#6366f1,#818cf8)"}}/>
                </div>
              </div>
              <div className="glow-card" style={{flex:1,background:"#0D0D16",border:"1px solid rgba(99,102,241,.18)",borderRadius:18,padding:"13px 15px"}}>
                <div style={{fontSize:10,color:"#6366f1",fontWeight:600,marginBottom:5}}>Top Momentum</div>
                <div className="shimmer" style={{fontSize:25,fontWeight:900,letterSpacing:-1,fontFamily:"Inter"}}>{topM.toFixed(1)}</div>
                <div style={{fontSize:9,color:"#363650",marginTop:7}}>上限なし・慣性スコア</div>
              </div>
            </div>
          )}

          {/* 振り返り表示 */}
          {todayRef&&!editMode&&(
            <div style={{margin:"12px 20px 0",background:"#0D0D16",border:"1px solid rgba(129,140,248,.12)",borderRadius:14,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{MOODS.find(m=>m.v===todayRef.mood)?.e||"📝"}</span>
              <div>
                <div style={{fontSize:11,color:"#818cf8",fontWeight:700}}>今日の振り返り記録済み</div>
                {todayRef.note&&<div style={{fontSize:10,color:"#555",marginTop:1,maxWidth:"62vw",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{todayRef.note}</div>}
              </div>
            </div>
          )}

          {/* 習慣リスト */}
          <div style={{padding:"12px 20px 0",display:"flex",flexDirection:"column",gap:10}}>
            {active.length===0&&<div style={{textAlign:"center",color:"#222235",fontSize:14,lineHeight:2.3,padding:"48px 0"}}>「＋ 習慣を追加」から<br/>最初の習慣を登録しましょう</div>}
            {active.map(h=>{
              const done=!!(h.checks[ym]||{})[td];
              const skipped=!!(h.skips[ym]||{})[td];
              const momentum=calcMomentum(h);
              const streak=calcStreak(h);
              if(editMode)return<EditCard key={h.id} habit={h} habits={habits} onRename={n=>renameHabit(h.id,n)} onRemove={()=>removeHabit(h.id)} onUpdate={f=>updateHabit(h.id,f)}/>;
              return<HabitCard key={h.id} habit={h} done={done} skipped={skipped} momentum={momentum} streak={streak} shieldAvail={!h.shieldUsed[ym]} onToggle={()=>toggleToday(h.id)} onSkip={()=>setSkipTarget(h.id)} onShield={()=>useShield(h.id)} onDetail={()=>setDetail(h)} onMicro={()=>setShowMicro(h.id)}/>;
            })}
            {habits.length<MAX&&(
              <button onClick={addHabit} style={{width:"100%",padding:"16px 0",background:"transparent",border:"1.5px dashed #1C1C2A",borderRadius:20,color:"#222235",fontSize:13,fontWeight:600,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"border-color .2s,color .2s"}}
                onMouseOver={e=>{e.currentTarget.style.borderColor="#383858";e.currentTarget.style.color="#555"}} onMouseOut={e=>{e.currentTarget.style.borderColor="#1C1C2A";e.currentTarget.style.color="#222235"}}>
                <span style={{fontSize:16}}>＋</span>習慣を追加<span style={{fontSize:10,color:"#222235",background:"#161626",borderRadius:4,padding:"1px 6px"}}>{habits.length}/{MAX}</span>
              </button>
            )}
          </div>

          <div style={{padding:"12px 20px 0"}}>
            <button onClick={()=>setEditMode(e=>!e)} style={{width:"100%",padding:"12px",borderRadius:14,fontSize:13,fontWeight:700,background:editMode?"#0B2018":"#0D0D16",color:editMode?"#22c55e":"#363650",border:editMode?"1px solid rgba(34,197,94,.28)":"1px solid #1C1C2A",transition:"all .2s"}}>
              {editMode?"✓ 完了":"✏️ 習慣を編集"}
            </button>
          </div>
          <div style={{height:16}}/>
        </div>
      )}

      {screen==="momentum"&&<MomentumScreen habits={habits} ym={ym}/>}
      {screen==="weekly"&&<WeeklyScreen report={weekReport} habits={habits}/>}
      {screen==="coach"&&<CoachScreen habits={habits} ym={ym} td={td} reflections={reflections}/>}

      {/* ボトムナビ */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(9,9,14,.97)",backdropFilter:"blur(24px)",borderTop:"1px solid #111120",display:"flex",paddingBottom:"env(safe-area-inset-bottom)",zIndex:100}}>
        {TABS.map(({key,label,icon:Icon})=>(
          <button key={key} className={`nav-btn${screen===key?" active":""}`} onClick={()=>{setScreen(key);setEditMode(false);}}>
            <Icon active={screen===key}/>{label}
          </button>
        ))}
      </nav>

      {detail&&<DetailSheet habit={habits.find(h=>h.id===detail.id)||detail} ym={ym} td={td} habits={habits} onClose={()=>setDetail(null)} onUpdate={f=>updateHabit(detail.id,f)}/>}
      {skipTarget&&<SkipSheet habit={habits.find(h=>h.id===skipTarget)} onRecord={(r,n)=>recordSkip(skipTarget,r,n)} onClose={()=>setSkipTarget(null)}/>}
      {showInsights&&<InsightSheet insights={insights} onClose={()=>setShowInsights(false)}/>}
      {reflectOpen&&<ReflectSheet onSave={saveReflection} onClose={()=>setReflectOpen(false)} habits={active} ym={ym} td={td}/>}
      {/* ★ Micro Habitポップアップ */}
      {showMicro&&microHabit&&<MicroSheet habit={microHabit} onClose={()=>setShowMicro(null)} onUpdate={f=>{updateHabit(showMicro,f);setShowMicro(null);showToast("Micro Habitを設定しました 🌱");}}/>}

      {toast&&<div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",background:"#6366f1",color:"#fff",padding:"11px 22px",borderRadius:100,fontWeight:700,fontSize:12,boxShadow:"0 8px 32px rgba(0,0,0,.6)",zIndex:400,whiteSpace:"nowrap",maxWidth:"90vw",animation:"slideUp .28s cubic-bezier(.22,1,.36,1)"}}>{toast}</div>}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ★ オンボーディング（完全リデザイン）
═══════════════════════════════════════════════ */
function Onboarding({onComplete}){
  const[step,setStep]=useState(0);
  const[name,setName]=useState("");
  const[why,setWhy]=useState("");
  const[micro,setMicro]=useState("");
  const[diff,setDiff]=useState("medium");
  const STEPS=["習慣名","Why","最小行動","難易度"];
  const pct=Math.round((step+1)/STEPS.length*100);

  const finish=()=>{
    const h=newHabit(1);
    onComplete({...h,name:name.trim(),why:why.trim(),microHabit:micro.trim(),difficulty:diff});
  };

  return(
    <div className="ob-wrap">
      <div className="ob-progress"><div className="ob-progress-fill" style={{width:`${pct}%`}}/></div>
      <div className="ob-screen">
        {/* ロゴ（step0のみ） */}
        {step===0&&(
          <div style={{marginBottom:36,textAlign:"center"}}>
            <div className="shimmer" style={{fontSize:38,fontWeight:900,letterSpacing:-2,fontFamily:"Inter"}}>Momentum</div>
            <div style={{fontSize:12,color:"#363650",marginTop:6}}>1日休んでも、慣性は続く。</div>
          </div>
        )}
        <div style={{fontSize:11,color:"#818cf8",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Step {step+1} / {STEPS.length}</div>

        {step===0&&(
          <div style={{animation:"onboardIn .3s ease"}}>
            <div style={{fontSize:22,fontWeight:800,marginBottom:8,letterSpacing:-.5}}>どんな習慣を始めますか？</div>
            <div style={{fontSize:13,color:"#555",marginBottom:20,lineHeight:1.7}}>まず1つだけ。小さく始めることが継続の鍵です。</div>
            <input className="field" value={name} onChange={e=>setName(e.target.value)} placeholder="例：毎朝30分英語学習" style={{fontSize:16,fontWeight:600}}/>
          </div>
        )}

        {step===1&&(
          <div style={{animation:"onboardIn .3s ease"}}>
            <div style={{fontSize:22,fontWeight:800,marginBottom:8,letterSpacing:-.5}}>なぜこの習慣が大切ですか？</div>
            <div style={{fontSize:13,color:"#555",marginBottom:8,lineHeight:1.7}}>
              行動科学の研究では、<strong style={{color:"#818cf8"}}>「なぜ」を言語化した人は継続率が2.5倍</strong>高いとされています。
            </div>
            <div style={{padding:"10px 14px",background:"rgba(99,102,241,.07)",border:"1px solid rgba(99,102,241,.18)",borderRadius:12,marginBottom:16,fontSize:12,color:"#818cf8",lineHeight:1.7}}>
              💭 「{name}」を続けると、どんな未来の自分に近づけますか？
            </div>
            <textarea className="field" value={why} onChange={e=>setWhy(e.target.value)} placeholder="例：グローバルに活躍したい。英語ができれば選択肢が広がる。" style={{resize:"none",height:90}}/>
          </div>
        )}

        {step===2&&(
          <div style={{animation:"onboardIn .3s ease"}}>
            <div style={{fontSize:22,fontWeight:800,marginBottom:8,letterSpacing:-.5}}>やる気ゼロでもできる最小行動は？</div>
            <div style={{fontSize:13,color:"#555",marginBottom:8,lineHeight:1.7}}>
              <strong style={{color:"#06b6d4"}}>Micro Habit</strong>とは、最悪な日でも「これだけはやる」最小単位の行動です。<br/>習慣を「ゼロか完璧か」から解放します。
            </div>
            <div style={{padding:"10px 14px",background:"rgba(6,182,212,.06)",border:"1px solid rgba(6,182,212,.2)",borderRadius:12,marginBottom:16,fontSize:12,color:"#06b6d4",lineHeight:1.7}}>
              🌱 例：「30分英語」のMicro Habit→「単語帳を1ページ開くだけ」
            </div>
            <input className="field" value={micro} onChange={e=>setMicro(e.target.value)} placeholder="例：単語帳を1ページ開くだけ"/>
            <div style={{fontSize:11,color:"#363650",marginTop:8}}>※ 空欄でもOK。後から設定できます。</div>
          </div>
        )}

        {step===3&&(
          <div style={{animation:"onboardIn .3s ease"}}>
            <div style={{fontSize:22,fontWeight:800,marginBottom:8,letterSpacing:-.5}}>難易度を選んでください</div>
            <div style={{fontSize:13,color:"#555",marginBottom:16,lineHeight:1.7}}>難しい習慣ほどMomentumの倍率が高くなります。</div>
            {DIFFS.map(d=>(
              <button key={d.id} onClick={()=>setDiff(d.id)} style={{width:"100%",padding:"14px 16px",borderRadius:14,marginBottom:10,background:diff===d.id?"#111128":"#0D0D16",border:`1px solid ${diff===d.id?d.color+"55":"#1C1C2A"}`,textAlign:"left",transition:"all .15s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{fontSize:14,fontWeight:700,color:diff===d.id?d.color:"#EFEFFA"}}>{d.label}</span>
                  <span style={{fontSize:11,color:"#555",marginLeft:10}}>{d.desc}</span>
                </div>
                <span style={{fontSize:16,fontWeight:900,color:d.color}}>×{d.mult}</span>
              </button>
            ))}
          </div>
        )}

        <div style={{display:"flex",gap:10,marginTop:24}}>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:"14px",borderRadius:14,background:"#161626",color:"#555",fontSize:14,fontWeight:600,border:"1px solid #1C1C2A"}}>← 戻る</button>}
          <button
            onClick={step<STEPS.length-1?()=>setStep(s=>s+1):finish}
            disabled={step===0&&!name.trim()}
            style={{flex:2,padding:"14px",borderRadius:14,fontSize:14,fontWeight:800,transition:"all .2s",
              background:step===0&&!name.trim()?"#161626":"linear-gradient(135deg,#6366f1,#818cf8)",
              color:step===0&&!name.trim()?"#363650":"#fff",
              boxShadow:step===0&&!name.trim()?"none":"0 4px 20px rgba(99,102,241,.32)"}}>
            {step<STEPS.length-1?"次へ →":"習慣を始める 🚀"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   習慣カード（クリーンデザイン）
═══════════════════════════════════ */
function HabitCard({habit,done,skipped,momentum,streak,shieldAvail,onToggle,onSkip,onShield,onDetail,onMicro}){
  const cardRef=useRef(null);
  const diff=DIFFS.find(d=>d.id===habit.difficulty)||DIFFS[1];
  const predict=predictMomentum(habit);
  const pct=Math.min(momentum/predict.next*100,100);

  const handleTap=e=>{
    if(!done){
      const r=cardRef.current?.getBoundingClientRect();
      if(r){const sz=Math.max(r.width,r.height)*2.2;const rp=document.createElement("div");rp.className="ripple";rp.style.cssText=`width:${sz}px;height:${sz}px;left:${(e.clientX||r.left+r.width/2)-r.left-sz/2}px;top:${(e.clientY||r.top+r.height/2)-r.top-sz/2}px;background:radial-gradient(circle,rgba(99,102,241,.48) 0%,transparent 70%);`;cardRef.current.appendChild(rp);setTimeout(()=>rp.remove(),700);}
    }
    onToggle();
  };

  return(
    <div ref={cardRef} className="hcard" style={{background:done?"#090F18":skipped?"#0E0A06":"#0D0D16",border:done?"1px solid rgba(99,102,241,.28)":skipped?"1px solid rgba(245,158,11,.16)":"1px solid #1C1C2A"}}>
      <div style={{display:"flex",alignItems:"stretch"}}>
        {/* チェックエリア */}
        <button onClick={handleTap} style={{flex:1,padding:"17px 14px",textAlign:"left",display:"flex",alignItems:"center",gap:14}}>
          {/* Momentum リング */}
          <div style={{position:"relative",flexShrink:0,width:40,height:40}}>
            <svg width="40" height="40" viewBox="0 0 40 40" style={{transform:"rotate(-90deg)"}}>
              <circle cx="20" cy="20" r="16" fill="none" stroke="#1C1C2A" strokeWidth="3.5"/>
              <circle cx="20" cy="20" r="16" fill="none" stroke={done?"#6366f1":skipped?"#f59e0b":"#222235"}
                strokeWidth="3.5" strokeDasharray={`${pct*1.005} 100.5`} strokeLinecap="round"
                style={{transition:"stroke-dasharray .8s cubic-bezier(.22,1,.36,1)"}}/>
            </svg>

        {ranked.map((h,i)=>{

                    {i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}

                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{h.name}</div>

              </div>
              <div style={{fontSize:10,color:"#363650",display:"flex",gap:12}}>
                <span>今月 <strong style={{color:"#EFEFFA"}}>{s.rate}%</strong></span>

                  const done=habit?!!(habit.checks[dayYm]||{})[Number(dd)]:false;
                  const todayStr=rYM()+"-"+p2(rDay());
                  const isToday=dateStr===todayStr;
                  return(
                    <div key={di} style={{flex:1,height:20,borderRadius:4,background:done?"#6366f1":"#161626",border:isToday?"1px solid rgba(129,140,248,.35)":"1px solid transparent",transition:"background .3s"}}/>
                  );
                })}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                {["月","火","水","木","金","土","日"].map(d=><div key={d} style={{flex:1,textAlign:"center",fontSize:8,color:"#363650"}}>{d}</div>)}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{height:16}}/>
    </div>
  );
}

                      {cnt>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${cnt/maxCnt*100}%`,background:iw?"rgba(239,68,68,.45)":"rgba(99,102,241,.3)"}}/>}

      </div>

            </div>

        </div>
      )}
      <div style={{height:16}}/>
    </div>
  );
}

  const[editEnv,setEditEnv]=useState(false);const[envText,setEnvText]=useState(habit.envDesign||"");
  const m=calcMomentum(habit),streak=calcStreak(habit),s=calcStats(habit,ym),p=predictMomentum(habit);
  const diff=DIFFS.find(d=>d.id===habit.difficulty)||DIFFS[1];
  const{worstDow,topR,total:skipTotal}=analyzeSkips(habit);
